<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dear Oggy</title>
    <meta name="language" content="en-US">
    <meta name="title" content="Dear Sun">
    <meta name="description" content="Collecting this wasn't easy — your star is my motivation to keep going! Contributions are welcome too.">
    <link rel="icon" type="image/x-icon" href="https://cdn.jsdelivr.net/gh/sun0225SUN/photos/img/20210715233345.png">
    <link rel="stylesheet" href="heart_of_love_tcw/006/css/love.css">
</head>


<body>

    <audio autoplay muted loop id="audios" preload="auto">
        <source src="https://raw.githubusercontent.com/rohith-sunilkumar/birthday/main/heart_of_love_tcw/006/MP3/1.mp3" type="audio/mpeg" />
    </audio>

    <div class="birthday-text">
        <h1>Happy Birthday Oggy</h1>
        <p>I love u so much</p>
    </div>

    <div class="container" onselectstart="return false;" unselectable="on" style="-moz-user-select:none;">

        <div class="body_left">
            <img src="heart_of_love_tcw/006/images/biubiubiu.gif" alt="" ondragstart='return false;'>
        </div>

        <div class="body_center love">
            <div class="block">
                <div class="div1"></div>
                <div class="div2"></div>
                <div class="div3"></div>
                <div class="div4"></div>
            </div>
        </div>
    </div>

    <div class="footer">
        <div class="border">
            <div class="border-top"></div>
            <div class="border-bottom"></div>
        </div>
    </div>

    <script type="text/javascript" src="heart_of_love_tcw/006/js/love.js"></script>
    
    <script>
        // Enable audio playback on user interaction
        document.addEventListener('click', function() {
            const audio = document.getElementById('audios');
            if (audio) {
                audio.muted = false;
                audio.play().catch(err => console.log('Audio play error:', err));
            }
        }, { once: true });
        
        // Also try to unmute and play after animation starts
        setTimeout(() => {
            const audio = document.getElementById('audios');
            if (audio) {
                audio.muted = false;
                audio.play().catch(err => console.log('Audio play error:', err));
            }
        }, 15000);
    </script>

</body>

</html>
